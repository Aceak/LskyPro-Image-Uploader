name: Release

on:
  push:
    tags: ['*']

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI
        run: |
          wait_ci() {
            for i in $(seq 1 30); do
              run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$GITHUB_SHA" --jq '.workflow_runs[] | select(.name=="CI")')
              conclusion=$(echo "$run" | jq -r '.conclusion')
              status=$(echo "$run" | jq -r '.status')
              if [ "$conclusion" = "success" ]; then
                return 0
              elif [ "$conclusion" = "failure" ]; then
                echo "CI failed"
                return 1
              elif [ "$status" = "in_progress" ] || [ "$status" = "queued" ]; then
                echo "Waiting for CI... ($i/30)"
                sleep 5
              else
                echo "CI not started yet... ($i/30)"
                sleep 5
              fi
            done
            return 2
          }
          wait_ci
          ret=$?
          if [ $ret -eq 0 ]; then
            echo "CI passed"
          elif [ $ret -eq 1 ]; then
            exit 1
          else
            echo "CI not complete, triggering re-run..."
            gh workflow run CI --ref main
            sleep 10
            wait_ci
            ret=$?
            if [ $ret -eq 0 ]; then
              echo "CI passed on retry"
            else
              echo "CI did not complete in time"
              exit 1
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  release:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Generate Release Notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          awk -v ver="## [${VERSION}]" '
            index($0,ver)==1 { found=1; next }
            found && /^## \[/ { exit }
            found
          ' CHANGELOG.md > release-notes.md
          echo "" >> release-notes.md
          echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> release-notes.md
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          body_path: release-notes.md
          files: |
            dist/main.js
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
